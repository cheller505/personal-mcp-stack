# Personal Knowledge MCP Stack — Docker Compose deployment
#
# Single-command alternative to the per-service systemd install. Each MCP
# runs as its own container; chat-mcp connects to the others over the
# internal `mcp` network. Data persists in named volumes.
#
# Quick start:
#   1. Copy .env.example to .env and fill in EMAIL_MCP_CLIENT_ID etc.
#   2. docker compose build
#   3. First-time auth (interactive, one per MCP that needs it):
#        docker compose run --rm email-mcp     # device-code flow
#        docker compose run --rm onenote-mcp   # device-code flow
#        docker compose run --rm clickup-mcp   # paste token
#        docker compose run --rm granola-mcp   # paste key
#        docker compose run --rm slack-mcp     # paste token
#      Ctrl-C each one after auth completes (the token is saved to the volume).
#   4. Configure ~/.chat-mcp/config.json — or use the chat-config volume
#      and put your config there (see chat-mcp/docker-config.example.json).
#   5. docker compose up -d
#   6. Open http://localhost:8082/
#
# Side-by-side with systemd: change the host-side ports below from 8765 etc.
# to 18765 etc. so the docker stack doesn't collide with running systemd
# services.

name: personal-mcp-stack

networks:
  mcp:
    driver: bridge

volumes:
  email-data:
  clickup-data:
  granola-data:
  onenote-data:
  slack-data:
  chat-data:
  ollama-data:

services:

  # ── sync MCPs ───────────────────────────────────────────────────────────

  email-mcp:
    build: ./email-mcp
    image: personal-mcp/email-mcp
    container_name: email-mcp
    networks: [mcp]
    volumes: [email-data:/data]
    environment:
      EMAIL_MCP_CLIENT_ID: ${EMAIL_MCP_CLIENT_ID}
      EMAIL_MCP_TENANT_ID: ${EMAIL_MCP_TENANT_ID}
      EMAIL_MCP_HOST: 0.0.0.0
      EMAIL_MCP_PORT: 8765
    ports: ["${EMAIL_MCP_HOST_PORT:-8765}:8765"]
    restart: unless-stopped
    stdin_open: true
    tty: true

  clickup-mcp:
    build: ./clickup-mcp
    image: personal-mcp/clickup-mcp
    container_name: clickup-mcp
    networks: [mcp]
    volumes: [clickup-data:/data]
    environment:
      CLICKUP_MCP_HOST: 0.0.0.0
      CLICKUP_MCP_PORT: 8767
    ports: ["${CLICKUP_MCP_HOST_PORT:-8767}:8767"]
    restart: unless-stopped
    stdin_open: true
    tty: true

  granola-mcp:
    build: ./granola-mcp
    image: personal-mcp/granola-mcp
    container_name: granola-mcp
    networks: [mcp]
    volumes: [granola-data:/data]
    environment:
      GRANOLA_MCP_HOST: 0.0.0.0
      GRANOLA_MCP_PORT: 8768
    ports: ["${GRANOLA_MCP_HOST_PORT:-8768}:8768"]
    restart: unless-stopped
    stdin_open: true
    tty: true

  onenote-mcp:
    build: ./onenote-mcp
    image: personal-mcp/onenote-mcp
    container_name: onenote-mcp
    networks: [mcp]
    volumes: [onenote-data:/data]
    environment:
      ONENOTE_MCP_CLIENT_ID: ${ONENOTE_MCP_CLIENT_ID}
      ONENOTE_MCP_TENANT_ID: ${ONENOTE_MCP_TENANT_ID}
      ONENOTE_MCP_HOST: 0.0.0.0
      ONENOTE_MCP_PORT: 8769
    ports: ["${ONENOTE_MCP_HOST_PORT:-8769}:8769"]
    restart: unless-stopped
    stdin_open: true
    tty: true

  slack-mcp:
    build: ./slack-mcp
    image: personal-mcp/slack-mcp
    container_name: slack-mcp
    networks: [mcp]
    volumes: [slack-data:/data]
    environment:
      SLACK_MCP_HOST: 0.0.0.0
      SLACK_MCP_PORT: 8770
    ports: ["${SLACK_MCP_HOST_PORT:-8770}:8770"]
    restart: unless-stopped
    stdin_open: true
    tty: true

  # ── LLM (Ollama) ────────────────────────────────────────────────────────
  # Comment this whole service out if you already run Ollama on the host or
  # want to point chat-mcp at a remote OpenAI-compatible endpoint instead.

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    networks: [mcp]
    volumes: [ollama-data:/root/.ollama]
    ports: ["${OLLAMA_HOST_PORT:-11434}:11434"]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── chat web UI ─────────────────────────────────────────────────────────

  chat-mcp:
    build: ./chat-mcp
    image: personal-mcp/chat-mcp
    container_name: chat-mcp
    networks: [mcp]
    volumes: [chat-data:/data]
    environment:
      CHAT_MCP_HOST: 0.0.0.0
      CHAT_MCP_PORT: 8082
    ports: ["${CHAT_MCP_HOST_PORT:-8082}:8082"]
    restart: unless-stopped
    depends_on:
      - email-mcp
      - clickup-mcp
      - granola-mcp
      - onenote-mcp
      - slack-mcp
      - ollama
